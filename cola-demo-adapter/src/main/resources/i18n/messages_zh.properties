# cola-demo 错误消息 - 中文
# BizErrorCode 枚举名称作为 message key

# Customer
B_CUSTOMER_NAME_NOT_BLANK=客户名称不能为空
B_CUSTOMER_COMPANY_TYPE_NOT_BLANK=公司类型不能为空

# User
B_USER_NOT_FOUND=用户不存在
B_USER_DISABLED=用户已被禁用

# Role
B_ROLE_CODE_NOT_BLANK=角色编码不能为空
B_ROLE_NAME_NOT_BLANK=角色名称不能为空
B_ROLE_NOT_FOUND=角色不存在

# Permission
B_PERMISSION_CODE_NOT_BLANK=权限编码不能为空
B_PERMISSION_NAME_NOT_BLANK=权限名称不能为空

# Order
B_ORDER_NAME_NOT_BLANK=订单名称不能为空
B_ORDER_AMOUNT_INVALID=订单金额无效

# ApiApp
B_API_APP_NAME_NOT_BLANK=应用名称不能为空
B_API_APP_NOT_FOUND=API应用不存在
B_API_APP_DISABLED=API应用已被禁用
B_API_APP_EXPIRED=API应用已过期
B_API_APP_PATH_NOT_ALLOWED=API应用无权访问该路径

# Auth
B_AUTH_LOGIN_RATE_LIMITED=登录尝试过于频繁，请稍后再试

# Message
B_MESSAGE_PUBLISH_FAILED=消息发送失败

# Pagination
B_PAGE_SIZE_EXCEEDED=每页条数超过最大限制

# Lock
B_LOCK_ACQUIRE_FAILED=获取锁失败，请稍后重试

# Common
B_PERMISSION_DENIED=权限不足

# === 非枚举类错误码 ===

# 认证相关
AUTH_BAD_CREDENTIALS=用户名或密码错误
AUTH_FAILED=认证失败
AUTH_NOT_AUTHENTICATED=未认证，请先登录
AUTH_TOKEN_INVALID=Token无效或已过期
AUTH_TOKEN_REVOKED=Token已被注销
AUTH_REFRESH_TOKEN_INVALID=Refresh Token无效或已过期
AUTH_REFRESH_TOKEN_REVOKED=Refresh Token已失效

# API Key 认证
API_KEY_INVALID=API Key无效
API_KEY_DISABLED=API应用已禁用
API_KEY_EXPIRED=API应用已过期
API_KEY_PATH_NOT_ALLOWED=API应用无权访问该路径
API_KEY_AUTH_FAILED=API Key认证失败

# 请求相关
REQUEST_BODY_INVALID=请求体格式错误

# Sentinel 限流
SENTINEL_FLOW=请求过于频繁，请稍后再试
SENTINEL_DEGRADE=服务降级中，请稍后再试
SENTINEL_PARAM_FLOW=热点参数限流，请稍后再试
SENTINEL_SYSTEM=系统保护触发，请稍后再试
SENTINEL_AUTHORITY=访问权限不足
SENTINEL_DEFAULT=请求被限流

# Gateway Sentinel
SENTINEL_GATEWAY=请求过于频繁，请稍后再试

# 通用
INTERNAL_ERROR=服务器内部错误
