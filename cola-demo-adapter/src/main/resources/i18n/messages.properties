# cola-demo Error Messages - Default (English)
# BizErrorCode enum names as message keys

# Customer
B_CUSTOMER_NAME_NOT_BLANK=Customer name must not be blank
B_CUSTOMER_COMPANY_TYPE_NOT_BLANK=Company type must not be blank

# User
B_USER_NOT_FOUND=User not found
B_USER_DISABLED=User is disabled

# Role
B_ROLE_CODE_NOT_BLANK=Role code must not be blank
B_ROLE_NAME_NOT_BLANK=Role name must not be blank
B_ROLE_NOT_FOUND=Role not found

# Permission
B_PERMISSION_CODE_NOT_BLANK=Permission code must not be blank
B_PERMISSION_NAME_NOT_BLANK=Permission name must not be blank

# Order
B_ORDER_NAME_NOT_BLANK=Order name must not be blank
B_ORDER_AMOUNT_INVALID=Order amount is invalid

# ApiApp
B_API_APP_NAME_NOT_BLANK=App name must not be blank
B_API_APP_NOT_FOUND=API app not found
B_API_APP_DISABLED=API app is disabled
B_API_APP_EXPIRED=API app has expired
B_API_APP_PATH_NOT_ALLOWED=API app is not allowed to access this path

# Auth
B_AUTH_LOGIN_RATE_LIMITED=Too many login attempts, please try again later

# Message
B_MESSAGE_PUBLISH_FAILED=Message publish failed

# Pagination
B_PAGE_SIZE_EXCEEDED=Page size exceeds maximum limit

# Lock
B_LOCK_ACQUIRE_FAILED=Failed to acquire lock, please retry later

# Common
B_PERMISSION_DENIED=Permission denied

# === Non-enum error codes ===

# Auth
AUTH_BAD_CREDENTIALS=Invalid username or password
AUTH_FAILED=Authentication failed
AUTH_NOT_AUTHENTICATED=Not authenticated, please login first
AUTH_TOKEN_INVALID=Token is invalid or expired
AUTH_TOKEN_REVOKED=Token has been revoked
AUTH_REFRESH_TOKEN_INVALID=Refresh token is invalid or expired
AUTH_REFRESH_TOKEN_REVOKED=Refresh token has been revoked

# API Key
API_KEY_INVALID=Invalid API Key
API_KEY_DISABLED=API app is disabled
API_KEY_EXPIRED=API app has expired
API_KEY_PATH_NOT_ALLOWED=API app is not allowed to access this path
API_KEY_AUTH_FAILED=API Key authentication failed

# Request
REQUEST_BODY_INVALID=Invalid request body format

# Sentinel
SENTINEL_FLOW=Too many requests, please try again later
SENTINEL_DEGRADE=Service degraded, please try again later
SENTINEL_PARAM_FLOW=Hot parameter rate limited, please try again later
SENTINEL_SYSTEM=System protection triggered, please try again later
SENTINEL_AUTHORITY=Access denied
SENTINEL_DEFAULT=Request rate limited

# Gateway Sentinel
SENTINEL_GATEWAY=Too many requests, please try again later

# Feign
FEIGN_FALLBACK=Remote service call failed, please try again later

# General
INTERNAL_ERROR=Internal server error
