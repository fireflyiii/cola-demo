# Apollo Config Reference - Copy to Apollo Portal application namespace
# AppId: cola-demo
# Format: properties
# Environment: DEV

# ======================== DataSource ========================
spring.datasource.url=jdbc:mysql://localhost:3306/cola-demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=cola
spring.datasource.password=1qaz2wsx3edc
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=DemoHikariCP

# ======================== Flyway ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8
spring.flyway.validate-on-migrate=false

# ======================== Redis ========================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
# spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.ssl.enabled=false
spring.data.redis.timeout=3000ms
spring.data.redis.connect-timeout=3000ms

# ======================== MyBatis-Plus ========================
mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.type-aliases-package=com.alibaba.cola.demo.infrastructure.dataobject
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ======================== Actuator ========================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.metrics.tags.application=${spring.application.name}

# ======================== Logging ========================
logging.level.com.alibaba.cola=DEBUG
logging.level.com.alibaba.cola.demo.adapter.security=INFO

# ======================== JWT ========================
jwt.secret=ColaDemoSecretKeyForJWTTokenGeneration2024MustBeLongEnoughForHS512DevOnly
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=cola-demo

# ======================== CORS ========================
cors.allowed-origins=http://localhost:3000,http://localhost:8080

# ======================== SpringDoc ========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.packages-to-scan=com.alibaba.cola.demo.adapter.web

# ======================== OpenFeign ========================
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000
spring.cloud.openfeign.client.config.default.logger-level=basic
spring.cloud.openfeign.compression.request.enabled=true
spring.cloud.openfeign.compression.request.mime-types=text/xml,application/xml,application/json
spring.cloud.openfeign.compression.request.min-request-size=2048
spring.cloud.openfeign.compression.response.enabled=true

# ======================== Sentinel + Feign ========================
spring.cloud.sentinel.feign.enabled=true
