server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: cola-demo
  # 关闭 JMX（微服务通过 Actuator/Prometheus 监控，不需要 JMX）
  jmx:
    enabled: false
  config:
    import: optional:apollo://
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cola-demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: DemoHikariCP

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: ${REDIS_TIMEOUT:3000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:3000ms}

  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: ${SENTINEL_PORT:8719}
      eager: false
      http-method-specify: true
      web-context-unify: false
      # Feign 整合 Sentinel 开关
      feign:
        enabled: true
      datasource:
        # 流控规则 - 从 Apollo 加载
        flow:
          apollo:
            namespace-name: application
            flow-rules-key: sentinel.flow.rules
            rule-type: flow
            default-flow-rule-value: "[]"
        # 降级规则 - 从 Apollo 加载
        degrade:
          apollo:
            namespace-name: application
            flow-rules-key: sentinel.degrade.rules
            rule-type: degrade
            default-flow-rule-value: "[]"

    # OpenFeign 配置
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
            logger-level: basic
      compression:
        request:
          enabled: true
          mime-types: text/xml,application/xml,application/json
          min-request-size: 2048
        response:
          enabled: true

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.alibaba.cola.demo.infrastructure.dataobject
  configuration:
    map-underscore-to-camel-case: true

# 优雅停机超时（等待在途请求完成的最大时间）
spring.lifecycle.timeout-per-shutdown-phase: 30s

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    com.alibaba.cola: INFO
    com.alibaba.cola.demo.adapter.security: INFO

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天
  issuer: cola-demo

# CORS配置
cors:
  allowed-origins: http://localhost:3000,http://localhost:8080

# SpringDoc配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.alibaba.cola.demo.adapter.web

apollo:
  meta: ${APOLLO_META:}
  cache-dir: ${APOLLO_CACHE_DIR:}
  cluster: ${APOLLO_CLUSTER:default}
  auto-update-injected-spring-properties: true

# Eureka 服务注册发现
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.uuid}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# RocketMQ 消息队列
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${spring.application.name}-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# 定时任务配置
schedule:
  enabled: ${SCHEDULE_ENABLED:true}
  cleanup:
    interval: 300000  # 清理任务间隔（毫秒），默认5分钟
