server:
  port: 8080

spring:
  application:
    name: cola-demo
  datasource:
    url: jdbc:mysql://localhost:3306/cola-demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:cola}
    password: ${DB_PASSWORD:1qaz2wsx3edc}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: DemoHikariCP

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    validate-on-migrate: false

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.alibaba.cola.demo.infrastructure.dataobject
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  health:
    db:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.alibaba.cola: DEBUG
    com.alibaba.cola.demo.adapter.security: DEBUG

# JWT配置
jwt:
  secret: ${JWT_SECRET:ColaDemoSecretKeyForJWTTokenGeneration2024MustBeLongEnoughForHS512}
  expiration: 86400000  # 24小时
  issuer: cola-demo
