# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cola-demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:cola}
    password: ${DB_PASSWORD:1qaz2wsx3edc}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:}  # Redis服务器未设置密码，注释掉此行
      database: ${REDIS_DATABASE:0}
      ssl:
        enabled: false
      timeout: 3000ms
      connect-timeout: 3000ms

  # 开发环境关闭 Eureka 服务发现
  cloud:
    discovery:
      enabled: false

  # 开发环境关闭 RocketMQ 自动配置
  autoconfigure:
    exclude:
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.alibaba.cola: DEBUG

management:
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

# JWT配置（开发环境使用默认密钥，生产环境必须通过环境变量设置）
jwt:
  secret: ${JWT_SECRET:ColaDemoSecretKeyForJWTTokenGeneration2024MustBeLongEnoughForHS512DevOnly}

# Eureka 开发环境配置（本地开发默认关闭）
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# RocketMQ 开发环境关闭
rocketmq:
  enabled: false
